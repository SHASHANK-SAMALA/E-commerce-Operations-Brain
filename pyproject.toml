[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ecommerce-brain"
version = "0.1.0"
description = "AI E-Commerce Operations Brain — Multi-Agent Agentic AI System"
requires-python = ">=3.11"
dependencies = [
    # ── LangGraph (PINNED — interrupt() + PostgresSaver break across minor versions) ──
    "langgraph==0.2.38",
    "langgraph-checkpoint-postgres==2.0.2",
    "langchain-openai==0.1.22",
    "langchain-core>=0.2.38,<0.3.0",
    "langchain>=0.2.16,<0.3.0",
    # ── Pydantic ──────────────────────────────────────────────────────────────
    "pydantic>=2.7.0,<3.0.0",
    "pydantic-settings>=2.3.0",
    # ── FastAPI ───────────────────────────────────────────────────────────────
    "fastapi>=0.111.0,<0.120.0",
    "uvicorn[standard]>=0.30.0",
    "slowapi>=0.1.9",
    "python-multipart>=0.0.9",
    # ── Database ──────────────────────────────────────────────────────────────
    "psycopg[binary]>=3.1.0,<4.0.0",
    "psycopg-pool>=3.2.0,<4.0.0",
    "pgvector>=0.3.0",
    "sqlalchemy>=2.0.30",
    # ── Cache ─────────────────────────────────────────────────────────────────
    "redis>=5.0.0",
    # ── MCP ───────────────────────────────────────────────────────────────────
    "mcp>=1.0.0",
    # ── Data / Math ───────────────────────────────────────────────────────────
    "pandas>=2.2.0",
    "scipy>=1.13.0",
    "numpy>=1.26.0",
    # ── Observability ─────────────────────────────────────────────────────────
    "opentelemetry-sdk>=1.24.0",
    "opentelemetry-instrumentation-fastapi>=0.45b0",
    "opentelemetry-exporter-prometheus>=0.45b0",
    "prometheus-client>=0.20.0",
    "structlog>=24.1.0",
    "langsmith>=0.1.88",
    "langchain-mcp-adapters>=0.1.0",
    # ── Evaluation ────────────────────────────────────────────────────────────
    "deepeval>=0.21.0",
    # ── Memory (Mem0 semantic layer) ─────────────────────────────────────────────
    "mem0ai>=0.1.0",
    "spacy>=3.7.0",                     # mem0 NLP lemmatization (en_core_web_sm)
    # ── Audio (Azure Whisper via openai client) ────────────────────────────────
    "openai>=1.35.0",
    # ── Utilities ─────────────────────────────────────────────────────────────
    "httpx>=0.27.0",
    "pyyaml>=6.0.1",
    "tenacity>=8.3.0",
    "aiofiles>=23.2.1",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.5.0",
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "bandit[toml]>=1.7.9",
    "detect-secrets>=1.5.0",
    "deepeval>=0.21.0",
]

[tool.hatch.build.targets.wheel]
packages = ["ecommerce_brain"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4"]
ignore = ["B008", "UP007"]

[tool.ruff.lint.per-file-ignores]
"ecommerce_brain/db/seed.py" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["ecommerce_brain"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]

[tool.bandit]
skips = ["B101"]
