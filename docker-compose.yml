
# ── Shared environment for all Python services ────────────────────────────────
x-backend-env: &backend-env
  DATABASE_URL: "postgresql://ecommerce:ecommerce@postgres:5432/ecommerce_brain"
  REDIS_URL: "redis://redis:6379/0"
  OTEL_ENDPOINT: "http://tempo:4317"
  OTEL_ENABLED: "true"
  MCP_SALES_URL: "http://mcp-sales:8001/sse"
  MCP_INVENTORY_URL: "http://mcp-inventory:8002/sse"
  MCP_MARKETING_URL: "http://mcp-marketing:8003/sse"
  MCP_SUPPORT_URL: "http://mcp-support:8004/sse"
  MCP_ACTION_URL: "http://mcp-action:8005/sse"

# All services that run Python code inherit these env vars from .env
x-backend-env-file: &backend-env-file
  env_file:
    - .env

x-backend-build: &backend-build
  build:
    context: .
    dockerfile: docker/Dockerfile.backend

x-postgres-dep: &postgres-dep
  postgres:
    condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce_brain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce_brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
      - "4317:4317"   # OTLP gRPC (app → Tempo)
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./docker/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
      - tempo

  # ── MCP Servers (one per domain + action) ─────────────────────────────────
  mcp-sales:
    <<: *backend-build
    command: python ecommerce_brain/mcp_servers/sales_mcp_server.py
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      <<: *backend-env
    depends_on:
      <<: *postgres-dep

  mcp-inventory:
    <<: *backend-build
    command: python ecommerce_brain/mcp_servers/inventory_mcp_server.py
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      <<: *backend-env
    depends_on:
      <<: *postgres-dep

  mcp-marketing:
    <<: *backend-build
    command: python ecommerce_brain/mcp_servers/marketing_mcp_server.py
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      <<: *backend-env
    depends_on:
      <<: *postgres-dep

  mcp-support:
    <<: *backend-build
    command: python ecommerce_brain/mcp_servers/support_mcp_server.py
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      <<: *backend-env
    depends_on:
      <<: *postgres-dep

  mcp-action:
    <<: *backend-build
    command: python ecommerce_brain/mcp_servers/action_mcp_server.py
    ports:
      - "8005:8005"
    env_file:
      - .env
    environment:
      <<: *backend-env
    depends_on:
      <<: *postgres-dep

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    <<: *backend-build
    command: python run_uvicorn.py
    ports:
      - "8000:8000"
      - "9091:9091"   # Prometheus scrape endpoint
    env_file:
      - .env
    environment:
      <<: *backend-env
      BACKEND_HOST: "0.0.0.0"
    depends_on:
      <<: *postgres-dep
      redis:
        condition: service_healthy
      mcp-sales:
        condition: service_started
      mcp-inventory:
        condition: service_started
      mcp-marketing:
        condition: service_started
      mcp-support:
        condition: service_started
      mcp-action:
        condition: service_started

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  grafana_data:
  tempo_data:
